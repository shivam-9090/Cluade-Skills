<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="Claude Skills — a curated collection of Agent Skills by InfoVision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060e"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- dotted grid -->
  <g fill="#1b2740">
    <!-- generated dot field -->
    <g>
      <circle cx="80" cy="60" r="1.5"/><circle cx="160" cy="60" r="1.5"/><circle cx="240" cy="60" r="1.5"/><circle cx="320" cy="60" r="1.5"/><circle cx="400" cy="60" r="1.5"/>
      <circle cx="80" cy="140" r="1.5"/><circle cx="160" cy="140" r="1.5"/><circle cx="240" cy="140" r="1.5"/><circle cx="320" cy="140" r="1.5"/>
      <circle cx="80" cy="220" r="1.5"/><circle cx="160" cy="220" r="1.5"/><circle cx="240" cy="220" r="1.5"/>
      <circle cx="80" cy="300" r="1.5"/><circle cx="160" cy="300" r="1.5"/>
    </g>
  </g>

  <!-- skill-node constellation, right side -->
  <g stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="1000" y1="110" x2="1090" y2="70"/>
    <line x1="1090" y1="70" x2="1170" y2="130"/>
    <line x1="1000" y1="110" x2="1050" y2="200"/>
    <line x1="1050" y1="200" x2="1150" y2="230"/>
    <line x1="1170" y1="130" x2="1150" y2="230"/>
    <line x1="1050" y1="200" x2="1170" y2="130"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="1000" cy="110" r="6"/><circle cx="1090" cy="70" r="6"/><circle cx="1170" cy="130" r="6"/>
    <circle cx="1050" cy="200" r="6"/><circle cx="1150" cy="230" r="6"/>
  </g>
  <g fill="#38bdf8" filter="url(#soft)" opacity="0.6">
    <circle cx="1000" cy="110" r="6"/><circle cx="1090" cy="70" r="6"/><circle cx="1170" cy="130" r="6"/>
    <circle cx="1050" cy="200" r="6"/><circle cx="1150" cy="230" r="6"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="180" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="#f8fafc" letter-spacing="-2">Claude Skills</text>
  <rect x="84" y="200" width="150" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="86" y="240" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#94a3b8">A curated collection of Agent Skills for Claude</text>
  <text x="86" y="292" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="16" fill="#38bdf8">by InfoVision · infovision.digital</text>
</svg>
